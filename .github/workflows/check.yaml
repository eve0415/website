name: Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm and Node.js
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm build

  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm and Node.js
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate .dev.vars
        run: |
          echo GITHUB_PAT=test >> .dev.vars
          echo MAIL_ADDRESS=test >> .dev.vars
          echo TURNSTILE_SECRET_KEY=test >> .dev.vars

      - name: Generate types
        run: pnpm generate

      - name: Run oxlint
        run: pnpm oxlint --type-aware --report-unused-disable-directives --deny-warnings --format github

  format:
    name: Format
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm and Node.js
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm oxfmt --check

  test:
    name: Test
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        project:
          - unit
          - browser
          - storybook

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm and Node.js
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        if: matrix.project == 'browser' || matrix.project == 'storybook'
        run: pnpm playwright install --with-deps

      - name: Generate .dev.vars
        run: |
          echo GITHUB_PAT=test >> .dev.vars
          echo MAIL_ADDRESS=test >> .dev.vars
          echo TURNSTILE_SECRET_KEY=test >> .dev.vars

      - name: Generate types
        run: pnpm generate

      - name: Build website
        if: matrix.project == 'unit'
        run: pnpm build

      - name: Run tests
        run: |
          pnpm vitest run \
            --project=${{ matrix.project }} \
            --reporter=verbose \
            --reporter=github-actions \
            --coverage.reportsDirectory="./coverage/${{ matrix.project }}" \
            --coverage.reporter=json \
            --coverage.reporter=json-summary

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.project }}
          path: coverage/${{ matrix.project }}/
          retention-days: 1

  coverage-merge:
    name: Merge Coverage
    runs-on: ubuntu-24.04-arm
    needs: test
    if: always() && !cancelled()
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm and Node.js
        uses: pnpm/setup@5d160c5bc68a09337ad0d5654e237e03253b5879 # v1.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage-parts/
          merge-multiple: false

      - name: Merge coverage reports
        run: |
          mkdir -p coverage .nyc_output
          # Copy coverage-final.json files with unique names for nyc merge
          i=1
          for f in coverage-parts/*/coverage-final.json; do
            if [ -f "$f" ]; then
              cp "$f" ".nyc_output/coverage-$i.json"
              i=$((i+1))
            fi
          done
          # Merge all coverage files
          pnpm nyc merge .nyc_output coverage/coverage-final.json
          # Generate summary report
          pnpm nyc report \
            --reporter=json-summary \
            --temp-dir=coverage \
            --report-dir=coverage

      - name: Upload merged coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.event_name == 'pull_request' && format('coverage-pr-{0}', github.event.pull_request.number) || format('coverage-{0}', github.ref_name) }}
          path: coverage/
          retention-days: 7

      - name: Download base coverage
        id: download-base
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: check.yaml
          branch: ${{ github.base_ref }}
          name: coverage-${{ github.base_ref }}
          path: coverage-base/
        continue-on-error: true

      - name: Coverage Report
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@02f3c2e641286b7fa308cd3e430783103ce6103b # v2.12.0
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          json-summary-compare-path: ${{ steps.download-base.outcome == 'success' && 'coverage-base/coverage-summary.json' || '' }}
          file-coverage-mode: changes
